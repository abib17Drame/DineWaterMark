# Docker Compose — DineDiWaterMark
# Deux services : backend (FastAPI) + frontend (Nginx)

services:
  #  Service Backend (API FastAPI) 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dinedi-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - fichiers_temp:/tmp/dinediwatermark
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  #  Service Frontend (Nginx pour l'UI SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dinedi-frontend
    ports:
      - "8082:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fichiers_temp:
    driver: local
 